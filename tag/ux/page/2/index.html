ons","為什麼不一次改完：一次 blog 大改版的三個工程決策","上一篇寫完設計診斷，這篇換工程的角度。","nuxt, vuetify, unocss, pnpm, github-actions, ssg, migration, 工程策略, 前端開發, 技術筆記",1776660900000,"2026-04-20T04:55:00.000Z",{"path":42,"draft":-1,"title":43,"description":44,"tags":45,"timestamp":46,"createdAt":47,"updatedAt":32,"year":14,"month":33},"\u002Fpost\u002F20260420-blog-design-vocabulary","替 blog 找設計詞彙：從 Vuetify 到 Magazine 風的一次設計診斷","我這個 blog 改版想做很久了。每次打開自己的站，都覺得「不對」，但說不出哪裡不對。看別人的 blog ──Josh Comeau、Robin Rendle、那些做得好的個人站 ──就知道差在哪一個層級的東西，但翻不出名字。","design, ui, ux, typography, editorial, magazine, vuetify, unocss, nuxt, 前端開發, 設計筆記",1776660600000,"2026-04-20T04:50:00.000Z",{"path":49,"draft":-1,"title":50,"description":51,"tags":52,"timestamp":53,"createdAt":54,"updatedAt":54,"year":14,"month":55},"\u002Fpost\u002F20260325-nuxt3-layout-height-management","Nuxt 3 Layout 與 Page 的高度職責分離：解決多餘 scrollbar 問題","在 Nuxt 3 的 SPA 專案中，Layout 與 Page 之間的高度管理是個容易踩坑的地方。本文記錄一個常見問題：各個 Page 各自用 h-screen 控制高度，導致出現多餘的外層 scrollbar，以及修正過程中學到的 CSS 定位觀念。","vue, nuxt, nuxt3, css, unocss, layout, 前端開發, 技術筆記",1774425659000,"2026-03-25T08:00:59.000Z",2,{"path":57,"draft":-1,"title":58,"description":59,"tags":60,"timestamp":61,"createdAt":62,"updatedAt":63,"year":14,"month":55},"\u002Fpost\u002F20260305-invisible-absolute-chart-export-pattern","用 invisible absolute 解決 Chart.js 在隱藏 Tab 中匯出空白圖片的問題","最近在做一個多 Tab 頁面的「下載圖表」功能時，踩到一個 Chart.js 的經典坑：當圖表所在的 Tab 被隱藏時，匯出的圖片是空白的。","css, chart.js, vue, nuxt3, canvas, visibility, display-none, scrollable-overflow, 前端開發, 技術筆記",1772724178552,"2026-03-05T15:22:58.552Z","2026-03-18T15:24:04.000Z",{"path":65,"draft":-1,"title":66,"description":67,"tags":68,"timestamp":69,"createdAt":70,"updatedAt":71,"year":72,"month":73},"\u002Fpost\u002F20251208-nuxt3-fetch-vs-axios-module-scope","Nuxt3 中 $fetch 與 axios 在模組頂層的差異","最近在重構公司專案的 API 層時，遇到了一個有趣的問題：原本用 axios 可以正常運作的程式碼，改用 Nuxt3 的 $fetch 後卻報錯了。這個問題讓我深入研究了 $fetch 和 axios 在底層實作上的差異。","nuxt, nuxt3, vue, vue3, $fetch, axios, ofetch",1765161991000,"2025-12-08T02:46:31.000Z","2026-04-19T10:09:36.000Z",2025,11,{"path":75,"draft":-1,"title":76,"description":77,"tags":78,"timestamp":79,"createdAt":80,"updatedAt":71,"year":72,"month":73},"\u002Fpost\u002F20251205-import-alias-tilde-vs-at-sign","Import Alias：~ vs @ 在不同框架的慣例","最近在重構專案時，發現自己一直習慣用 @ 來做 import alias，但 Nuxt3 的官方文件卻都用 ~。這讓我開始好奇：這兩個符號到底有什麼差異？各個框架的慣例又是什麼？","nuxt, nuxt3, next.js, vue, react, typescript, 隨筆",1764892800000,"2025-12-05T00:00:00Z",{"path":82,"draft":-1,"title":83,"description":84,"tags":85,"timestamp":86,"createdAt":87,"updatedAt":88,"year":89,"month":73},"\u002Fpost\u002F20241230-nuxt-3-nested-routes","Nuxt3 Nested Routes 與 active class","今天在處理公司專案的時候，遇到一個 Nuxt3 nested routes 小問題，剛好把它記錄下來，就當作這個 blog 2024 年最後一篇文章了 (遮臉)。","vue, nuxt, vue3, nuxt3, vue-router, 隨筆",1735553815000,"2024-12-30T10:16:55.000Z","2024-12-31T05:30:45.000Z",2024,{"path":91,"draft":-1,"title":92,"description":92,"tags":93,"timestamp":94,"createdAt":95,"updatedAt":96,"year":97,"month":98},"\u002Fpost\u002F20201026-build-your-blog-with-nuxt-and-nuxt-content-1","利用 Nuxt.js 與 nuxt\u002Fcontent 搭建部落格 (1)","nuxt, nuxt content, nuxt2, vue, vue2, jamstack",1603722972000,"2020-10-26T14:36:12Z","2024-03-04T07:46:02.000Z",2020,9,["Reactive",100],{"$scolor-mode":101,"$ssearch-open":104,"$ssite-config":105},{"preference":102,"value":102,"unknown":103,"forced":104},"system",true,false,{"env":106,"name":107,"url":108},"production","nuxt-app","https:\u002F\u002Fcharlie0228.github.io\u002F",["Set"],["ShallowReactive",111],{"tag=ux&page=2":112},null,"\u002Ftag\u002Fux\u002Fpage\u002F2"]</script></body></html>
